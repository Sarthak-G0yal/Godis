services:
  godis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: godis
    expose:
      - "6379"
    volumes:
      - godis-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${GODIS_CPUS:-1.00}"
          memory: "${GODIS_MEM:-512M}"
    networks:
      - godis-net

  godis-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: godis-ui
    ports:
      - "${UI_BIND_HOST:-0.0.0.0}:${UI_PORT:-8501}:8501"
    environment:
      GODIS_HOST: godis
      GODIS_PORT: "6379"
    depends_on:
      - godis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${GODIS_UI_CPUS:-0.50}"
          memory: "${GODIS_UI_MEM:-384M}"
    networks:
      - godis-net

volumes:
  godis-data:

networks:
  godis-net:
    driver: bridge
